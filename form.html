<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Docs</title>
  </head>
  <body>
    <h1>Form Docs</h1>

    <form action="">
      <div>
        <label for="f_name">First Name:</label>
        <input
          type="text"
          name="f_name"
          id="f_name"
          value=""
          placeholder="Jon"
        />
      </div>

      <div>
        <label for="l_name">Last Name:</label>
        <input
          type="text"
          name="l_name"
          id="l_name"
          value=""
          placeholder="Doe"
        />
      </div>

      <div>
        <label for="email">Email:</label>
        <input
          type="email"
          name="email"
          id="email"
          value=""
          placeholder="ultimate@gmail.com"
        />
      </div>

      <div>
        <label for="age">Age:</label>
        <input type="number" name="age" id="age" value="" placeholder="10" />
      </div>

      <div>
        <label for="password">Password:</label>
        <input
          type="password"
          name="password"
          id="password"
          value=""
          placeholder="******"
        />
      </div>

      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
  </body>
</html>
