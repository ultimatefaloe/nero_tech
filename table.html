<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Docs</title>
  </head>
  <body>
    <style>
      table,
      th,
      td{
        border: 1px solid #0c11a7;
        padding: 4px;
      }
    </style>

    <h1>Table Docs</h1>

    <table>
      <tr>
        <th>Product Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Sold</th>
      </tr>
      <tr>
        <td>Rubik</td>
        <td>5000</td>
        <td>8</td>
        <td>3</td>
      </tr>
      <tr>
        <td>Books</td>
        <td>2000</td>
        <td>100</td>
        <td>60</td>
      </tr>
    </table>

  </body>
</html>
